
  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Brand Dashboard</title>
  <style>
    /* General page styling */
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #e0f0ff, #ffffff);
      margin: 0;
      padding: 0;
      color: #333;
    }

    /* Header with logo */
    header {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      background-color: #ffffff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      flex-wrap: wrap; /* allow wrapping on small screens */
      justify-content: center; /* center content on mobile */
    }
    #brand-logo {
      width: 180px;
      height: auto;
      margin: 10px;
    }
    header h1 {
      font-size: 24px;
      color: #1e90ff;
      margin: 10px;
    }

    /* Host image section */
    .host-image {
      width: 90%;
      max-width: 600px;
      display: block;
      margin: 20px auto;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* Dashboard button */
    .dashboard-btn {
      display: inline-block;
      padding: 12px 24px;
      margin: 20px auto;
      background-color: #1e90ff;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      text-align: center;
      transition: 0.3s;
    }
    .dashboard-btn:hover {
      background-color: #0d6efd;
      transform: scale(1.05);
    }
    .dashboard-container {
      text-align: center;
    }

    /* Bundle section with Fibonacci style */
    .bundle {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      margin: 20px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    .bundle-item {
      background-color: #ffffff;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
      font-size: 18px;
      transition: 0.3s;
    }
    .bundle-item:hover {
      background-color: #e0f0ff;
      transform: scale(1.05);
    }
    .bundle-item span {
      display: block;
      font-size: 28px;
      margin-bottom: 5px;
    }

    /* Responsive tweaks */
    @media (max-width: 600px) {
      #brand-logo {
        width: 140px;
      }
      header h1 {
        font-size: 20px;
        text-align: center;
        width: 100%;
      }
      .bundle {
        grid-template-columns: 1fr; /* stack bundles vertically on small screens */
      }
      .bundle-item {
        font-size: 16px;
      }
      .bundle-item span {
        font-size: 24px;
      }
      .dashboard-btn {
        width: 80%;
      }
    }
  </style>
</head>
<body>

  <!-- Header with Logo -->
  <header>
    <img src="URL_OF_YOUR_LOGO" alt="Brand Logo" id="brand-logo">
    <h1>🌄 Your Brand Dashboard</h1>
  </header>

  <!-- Host Image -->
  <img src="URL_OF_HOST_IMAGE" alt="Host Image" class="host-image">

  <!-- Dashboard Button -->
  <div class="dashboard-container">
    <a href="URL_TO_DASHBOARD" class="dashboard-btn">Go to Dashboard 🚀</a>
  </div>

  <!-- Bundle Section (Fibonacci Style with Emojis) -->
  <div class="bundle">
    <div class="bundle-item"><span>🍀</span> Bundle 1</div>
    <div class="bundle-item"><span>🔥</span> Bundle 2</div>
    <div class="bundle-item"><span>💎</span> Bundle 3</div>
    <div class="bundle-item"><span>🌟</span> Bundle 4</div>
    <div class="bundle-item"><span>⚡</span> Bundle 5</div>
    <div class="bundle-item"><span>🎯</span> Bundle 6</div>
  </div>

</body>
</html>
