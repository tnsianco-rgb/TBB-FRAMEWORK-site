<header>
  <!-- Logo / Fibonacci placeholder -->
  <div class="logo-container">
    <img src="fibonacci-logo.png" alt="TBB Framework Logo" class="logo">
  </div>
  
  <!-- Header Text -->
  <h1>TBB Framework</h1>
  <p>Your system for disciplined positioning and structured growth</p>
  
  <!-- Stars Canvas -->
  <canvas id="star-canvas"></canvas>
</header>

<style>
header {
  text-align: center;
  padding: 60px 20px 40px 20px;
  background: linear-gradient(to right, #003366, #336699);
  color: #ffffff;
  position: relative;
  overflow: hidden;
}
header h1 {
  font-size: 2.8em;
  margin: 0.3em 0;
}
header p {
  font-size: 1.3em;
  margin: 0.5em 0 1em 0;
}
.logo-container {
  margin-bottom: 20px;
}
.logo {
  max-width: 100px;
  height: auto;
  display: inline-block;
}
#star-canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
</style>

<script>
// Sparkle stars animation
const canvas = document.getElementById('star-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  canvas.width = header.offsetWidth;
  canvas.height = header.offsetHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Star constructor
class Star {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 1;
    this.speed = Math.random() * 0.5 + 0.1;
    this.opacity = Math.random();
  }
  update() {
    this.y -= this.speed;
    this.opacity += (Math.random() - 0.5) * 0.05;
    if (this.y < 0 || this.opacity <= 0 || this.opacity > 1) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
    ctx.fill();
  }
}

// Create stars
for (let i = 0; i < 80; i++) {
  stars.push(new Star());
}

// Animate
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(star => {
    star.update();
    star.draw();
  });
  requestAnimationFrame(animate);
}
animate();
      </script>
